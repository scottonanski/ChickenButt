<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChickenButt transcript</title>
  <link rel="stylesheet" href="vendor/highlight-github-dark.min.css" id="hljs-theme-dark" />
  <link rel="stylesheet" href="vendor/highlight-github.min.css" id="hljs-theme-light" disabled />
  <link rel="stylesheet" href="app.css" />
</head>
<body class="theme-dark">
  <div id="root">
    <div id="empty" class="empty">
      <!-- Tight 16x16 brand icons (scale cleanly). Avoid logo-*-svg: 1920x1080 artboards. -->
      <img
        id="empty-icon"
        class="empty-icon"
        src="../icons/chickenbutt-light-icon.svg"
        alt=""
        width="64"
        height="64"
        draggable="false"
      />
      <div class="empty-title">Start a conversation</div>
      <div class="empty-sub">Need a model?
Type in the box: ollama pull &lt;model-name&gt;</div>
    </div>
    <div id="messages" class="messages" hidden></div>
  </div>
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
